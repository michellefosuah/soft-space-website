<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soft Space · Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&family=Parisienne&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script>
    /* Theme before paint (no auth redirect here — this IS the entry page). */
    (function () {
      try {
        var b = JSON.parse(localStorage.getItem("ss:boot") || "{}");
        var t = b.theme || "system";
        if (t === "system") t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
        if (b.accent) document.documentElement.style.setProperty("--accent", b.accent);
      } catch (e) {}
    })();
  </script>
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { width: min(420px, 100%); padding: 30px; }
    .auth-brand { text-align: center; margin-bottom: 20px; }
    .auth-brand h1 { font-size: 34px; }
    .auth-brand p { color: var(--text-soft); font-size: 13px; }
    .auth-err { color: var(--danger); font-size: 13px; min-height: 18px; }
    .auth-switch { text-align: center; font-size: 13px; color: var(--text-soft); margin-top: 14px; }
    .auth-switch a { color: var(--accent); cursor: pointer; font-weight: 500; }
  </style>
</head>
<body>
  <div class="background-gradient"></div>
  <div class="sparkles"></div>

  <div class="auth-wrap">
    <div class="card glass auth-card">
      <div class="auth-brand">
        <h1>Soft Space</h1>
        <p>your peaceful corner</p>
      </div>

      <div class="seg" id="mode" style="width:100%;justify-content:center;margin-bottom:18px">
        <button data-m="login" class="on">Sign in</button>
        <button data-m="signup">Create account</button>
      </div>

      <form id="authForm" class="stack">
        <div class="field" id="nameField" hidden>
          <label>Name</label>
          <input id="name" autocomplete="name" placeholder="What should we call you?" />
        </div>
        <div class="field">
          <label>Email</label>
          <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <p class="auth-err" id="err"></p>
        <button class="btn btn--primary btn--block" id="submit" type="submit">Sign in</button>
      </form>

      <p class="auth-switch" id="switch"></p>
      <p class="muted" style="font-size:11px;text-align:center;margin-top:16px;line-height:1.5">
        Accounts are stored locally in this browser. This is a personal-use gate,
        not bank-grade security.
      </p>
    </div>
  </div>

  <script src="assets/js/core.js"></script>
  <script src="assets/js/db.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    (function () {
      // Already signed in? Skip straight to the app.
      if (SS.Auth.isAuthed()) { location.replace("index.html"); return; }

      let mode = "login";
      const $ = (id) => document.getElementById(id);
      const err = $("err");

      function applyMode() {
        const signup = mode === "signup";
        $("nameField").hidden = !signup;
        $("password").autocomplete = signup ? "new-password" : "current-password";
        $("submit").textContent = signup ? "Create account" : "Sign in";
        $("switch").innerHTML = signup
          ? `Already have an account? <a id="toLogin">Sign in</a>`
          : `New here? <a id="toSignup">Create an account</a>`;
        document.querySelectorAll("#mode button").forEach((b) => b.classList.toggle("on", b.dataset.m === mode));
        err.textContent = "";
        const alt = $(signup ? "toLogin" : "toSignup");
        if (alt) alt.onclick = () => { mode = signup ? "login" : "signup"; applyMode(); };
      }

      $("mode").addEventListener("click", (e) => {
        const b = e.target.closest("button[data-m]"); if (!b) return;
        mode = b.dataset.m; applyMode();
      });

      $("authForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        err.textContent = "";
        const payload = {
          name: $("name").value,
          email: $("email").value,
          password: $("password").value,
        };
        $("submit").disabled = true;
        try {
          if (mode === "signup") await SS.Auth.signUp(payload);
          else await SS.Auth.logIn(payload);
          location.replace("index.html");
        } catch (ex) {
          err.textContent = ex.message || "Something went wrong.";
          $("submit").disabled = false;
        }
      });

      applyMode();
    })();
  </script>
</body>
</html>
